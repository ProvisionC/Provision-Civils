kind = "mobile"
previewPath = "/"
title = "Provision Civils"
version = "1.0.0"
id = "artifacts/provision-civils"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20116

[services.development]
run = "pnpm --filter @workspace/provision-civils run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/provision-civils", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/provision-civils", "run", "serve" ]

[services.env]
PORT = "20116"
BASE_PATH = "/"
