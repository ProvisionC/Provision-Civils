openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Provision Civils - Construction Job Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard stats
  - name: jobs
    description: Job management
  - name: clients
    description: Client management
  - name: employees
    description: Employee management
  - name: invoices
    description: Invoice management
  - name: notifications
    description: Notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: supervisorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Not found

    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found

    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /jobs/{id}/photos:
    get:
      operationId: listJobPhotos
      tags: [jobs]
      summary: List photos for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobPhoto"

    post:
      operationId: addJobPhoto
      tags: [jobs]
      summary: Add a photo to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobPhotoInput"
      responses:
        "201":
          description: Photo added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPhoto"

  /jobs/{id}/photos/{photoId}:
    delete:
      operationId: deleteJobPhoto
      tags: [jobs]
      summary: Delete a job photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /jobs/{id}/materials:
    put:
      operationId: updateJobMaterials
      tags: [jobs]
      summary: Update materials checklist for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [materials]
              properties:
                materials:
                  type: array
                  items:
                    $ref: "#/components/schemas/JobMaterialInput"
      responses:
        "200":
          description: Materials updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobMaterial"

  /jobs/{id}/gps-logs:
    get:
      operationId: listJobGpsLogs
      tags: [jobs]
      summary: List GPS logs for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GPS logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsLog"

    post:
      operationId: createJobGpsLog
      tags: [jobs]
      summary: Create a GPS log entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsLogInput"
      responses:
        "201":
          description: GPS log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsLog"

  /jobs/{id}/daily-reports:
    get:
      operationId: listDailyReports
      tags: [jobs]
      summary: List daily reports for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daily reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReport"

    post:
      operationId: createDailyReport
      tags: [jobs]
      summary: Create a daily report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyReportInput"
      responses:
        "201":
          description: Daily report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /jobs/{id}/expenses:
    get:
      operationId: listJobExpenses
      tags: [jobs]
      summary: List expenses for a job (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
        "403":
          description: Forbidden

    post:
      operationId: createJobExpense
      tags: [jobs]
      summary: Create an expense for a job (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "403":
          description: Forbidden

  /jobs/{id}/expenses/{expenseId}:
    delete:
      operationId: deleteJobExpense
      tags: [jobs]
      summary: Delete an expense (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"

    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found

    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found

    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, project_manager, supervisor, worker]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string

    DashboardStats:
      type: object
      required: [activeJobs, completedJobs, overdueJobs, jobsDueToday, totalEmployees, totalInvoices]
      properties:
        activeJobs:
          type: integer
        completedJobs:
          type: integer
        overdueJobs:
          type: integer
        jobsDueToday:
          type: integer
        totalEmployees:
          type: integer
        totalInvoices:
          type: integer
        pendingWayleave:
          type: integer
        totalContractValue:
          type: number
        totalExpenses:
          type: number
        totalInvoiced:
          type: number
        estimatedProfit:
          type: number

    Client:
      type: object
      required: [id, companyName, createdAt]
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        vatNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ClientInput:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        vatNumber:
          type: string
        notes:
          type: string

    Expense:
      type: object
      required: [id, jobId, createdById, date, category, description, amount, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        createdById:
          type: integer
        date:
          type: string
        category:
          type: string
          enum: [fuel, diesel, accommodation, labour, plant_hire, tools, concrete, materials, subcontractors, other]
        description:
          type: string
        amount:
          type: number
        receiptPhotoUri:
          type: ["string", "null"]
        createdAt:
          type: string

    ExpenseInput:
      type: object
      required: [date, category, description, amount]
      properties:
        date:
          type: string
        category:
          type: string
          enum: [fuel, diesel, accommodation, labour, plant_hire, tools, concrete, materials, subcontractors, other]
        description:
          type: string
        amount:
          type: number
        receiptPhotoUri:
          type: string

    Job:
      type: object
      required: [id, jobNumber, clientName, status, createdAt]
      properties:
        id:
          type: integer
        jobNumber:
          type: string
        clientId:
          type: ["integer", "null"]
        clientName:
          type: string
        clientPhone:
          type: ["string", "null"]
        clientEmail:
          type: ["string", "null"]
        projectName:
          type: ["string", "null"]
        projectNumber:
          type: ["string", "null"]
        projectManagerId:
          type: ["integer", "null"]
        poNumber:
          type: ["string", "null"]
        clientOrderNumber:
          type: ["string", "null"]
        contractValue:
          type: ["number", "null"]
        siteAddress:
          type: ["string", "null"]
        gpsLat:
          type: ["number", "null"]
        gpsLng:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        labourHours:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, in_progress, active, waiting_for_wayleave, waiting_for_materials, completed, cancelled]
        supervisorId:
          type: ["integer", "null"]
        startDate:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        wayleaveRequired:
          type: boolean
        wayleaveDocument:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    JobDetail:
      type: object
      required: [id, jobNumber, clientName, status, createdAt, workers, materials, equipment]
      properties:
        id:
          type: integer
        jobNumber:
          type: string
        clientId:
          type: ["integer", "null"]
        clientName:
          type: string
        clientPhone:
          type: ["string", "null"]
        clientEmail:
          type: ["string", "null"]
        projectName:
          type: ["string", "null"]
        projectNumber:
          type: ["string", "null"]
        projectManagerId:
          type: ["integer", "null"]
        poNumber:
          type: ["string", "null"]
        clientOrderNumber:
          type: ["string", "null"]
        contractValue:
          type: ["number", "null"]
        siteAddress:
          type: ["string", "null"]
        gpsLat:
          type: ["number", "null"]
        gpsLng:
          type: ["number", "null"]
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        labourHours:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, in_progress, active, waiting_for_wayleave, waiting_for_materials, completed, cancelled]
        supervisorId:
          type: ["integer", "null"]
        startDate:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        wayleaveRequired:
          type: boolean
        wayleaveDocument:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        workers:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
        materials:
          type: array
          items:
            $ref: "#/components/schemas/JobMaterial"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/JobEquipment"

    JobInput:
      type: object
      required: [clientName]
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        clientPhone:
          type: string
        clientEmail:
          type: string
        projectName:
          type: string
        projectNumber:
          type: string
        projectManagerId:
          type: integer
        poNumber:
          type: string
        clientOrderNumber:
          type: string
        contractValue:
          type: number
        siteAddress:
          type: string
        gpsLat:
          type: number
        gpsLng:
          type: number
        description:
          type: string
        notes:
          type: string
        labourHours:
          type: number
        supervisorId:
          type: integer
        startDate:
          type: string
        dueDate:
          type: string
        status:
          type: string
          enum: [pending, in_progress, active, waiting_for_wayleave, waiting_for_materials, completed, cancelled]
        wayleaveRequired:
          type: boolean
        workerIds:
          type: array
          items:
            type: integer
        materials:
          type: array
          items:
            $ref: "#/components/schemas/JobMaterialInput"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/JobEquipmentInput"

    JobUpdate:
      type: object
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        clientPhone:
          type: string
        clientEmail:
          type: string
        projectName:
          type: string
        projectNumber:
          type: string
        projectManagerId:
          type: integer
        poNumber:
          type: string
        clientOrderNumber:
          type: string
        contractValue:
          type: number
        siteAddress:
          type: string
        gpsLat:
          type: number
        gpsLng:
          type: number
        description:
          type: string
        notes:
          type: string
        labourHours:
          type: number
        status:
          type: string
          enum: [pending, in_progress, active, waiting_for_wayleave, waiting_for_materials, completed, cancelled]
        supervisorId:
          type: integer
        startDate:
          type: string
        dueDate:
          type: string
        wayleaveRequired:
          type: boolean
        wayleaveDocument:
          type: string
        workerIds:
          type: array
          items:
            type: integer
        materials:
          type: array
          items:
            $ref: "#/components/schemas/JobMaterialInput"
        equipment:
          type: array
          items:
            $ref: "#/components/schemas/JobEquipmentInput"

    JobMaterial:
      type: object
      required: [id, jobId, name, quantity, unit, checked, isCustom]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        cost:
          type: ["number", "null"]
        checked:
          type: boolean
        notes:
          type: ["string", "null"]
        isCustom:
          type: boolean

    JobMaterialInput:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
